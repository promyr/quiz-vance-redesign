name: Quiz Vance Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.4'
  BACKEND_URL: ${{ vars.BACKEND_URL || 'https://quiz-vance-redesign-backend.fly.dev' }}

jobs:
  analyze:
    name: Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

  build-android:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=BACKEND_URL=${{ env.BACKEND_URL }}

      - name: Build AAB
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release --dart-define=BACKEND_URL=${{ env.BACKEND_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Upload AAB artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install OpenSSL
        run: choco install openssl --no-progress -y

      - name: Configure OpenSSL
        shell: pwsh
        run: |
          $root = Get-ChildItem 'C:\Program Files' -Directory |
            Where-Object { $_.Name -like 'OpenSSL*' } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $root) {
            throw 'OpenSSL installation not found after chocolatey install.'
          }
          "OPENSSL_ROOT_DIR=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows
        run: flutter build windows --release --dart-define=BACKEND_URL=${{ env.BACKEND_URL }}

      - name: Package Windows artifact
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/quiz-vance-windows-release.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/quiz-vance-windows-release.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: artifacts/android-aab

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/*.apk
            artifacts/android-aab/*.aab
            artifacts/windows/*.zip
          generate_release_notes: true
          body: |
            ## Quiz Vance ${{ github.ref_name }}

            ### Downloads
            - Android APK release
            - Android AAB release
            - Windows zip release

            ### Configuracao
            Defina a variavel `BACKEND_URL` no repositorio para apontar para seu backend Python/FastAPI.
