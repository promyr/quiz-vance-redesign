name: quiz_vance_flutter
description: Quiz Vance - Plataforma de estudos com IA, SRS e gamificação.
publish_to: none
version: 2.0.9+3

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3: ^2.9.4
  sqlcipher_flutter_libs: ^0.6.6
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1

  # UI / Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0

  # File handling
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^26.2.14
  image: ^4.1.7          # resize/compress de imagens antes de base64 (pure Dart)

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/quiz_vance_logo_1024.png
    - assets/lottie/
